# companies_config.yaml
# Maps company name → ATS platform + board token/slug.
#
# Supported platforms:  greenhouse | lever | smartrecruiters
#
# To find a company's token:
#   Greenhouse  → visit  https://boards.greenhouse.io/{token}
#   Lever       → visit  https://jobs.lever.co/{slug}
#   SmartRecr.  → visit  https://jobs.smartrecruiters.com/{id}
# ─────────────────────────────────────────────────────────────

